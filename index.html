<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Half Frame Film Splitter</title>
  <style>
    /* ================================================================
       Windows XP Luna Theme
    ================================================================ */
    :root {
      --xp-bg:           #ECE9D8;
      --xp-border-lite:  #FFFFFF;
      --xp-border-mid:   #ACA899;
      --xp-border-dark:  #716F64;
      --xp-blue:         #3169C4;
      --xp-blue-dark:    #0A246A;
      --xp-selected:     #316AC5;
      --xp-desktop:      #3A6EA5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--xp-desktop);
      font-family: Tahoma, 'MS Sans Serif', Arial, sans-serif;
      font-size: 11px;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 56px;
      color: #000;
    }

    /* ── Window ─────────────────────────────────────── */
    .window {
      width: 720px;
      max-width: 98vw;
      background: var(--xp-bg);
      border-radius: 8px 8px 3px 3px;
      border: 1px solid var(--xp-blue-dark);
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,.5),
        3px 4px 12px rgba(0,0,0,.55);
    }

    /* ── Title bar ──────────────────────────────────── */
    .titlebar {
      height: 28px;
      background: linear-gradient(
        180deg,
        #6AA0E0 0%,  #3169C4 8%,
        #1B5AC8 42%, #3169C4 88%,
        #1B5AC8 93%, #2462C8 100%
      );
      border-radius: 7px 7px 0 0;
      padding: 0 5px;
      display: flex;
      align-items: center;
      gap: 5px;
      user-select: none;
    }

    .titlebar-icon { width: 16px; height: 16px; flex-shrink: 0; }

    .titlebar-text {
      flex: 1;
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .titlebar-btns { display: flex; gap: 2px; }

    .tb-btn {
      width: 21px; height: 21px;
      border-radius: 3px;
      border: 1px solid;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: bold; color: #fff;
      text-shadow: 0 1px 1px rgba(0,0,0,.6);
      flex-shrink: 0;
    }
    .tb-btn.min, .tb-btn.max {
      background: linear-gradient(180deg, #6BAAE8, #4880C8);
      border-color: #2060A0 #92C4F4 #92C4F4 #2060A0;
    }
    .tb-btn.close {
      background: linear-gradient(180deg, #E88868, #C83020);
      border-color: #801010 #F0A080 #F0A080 #801010;
    }
    .tb-btn:hover  { filter: brightness(1.15); }
    .tb-btn:active { filter: brightness(.88); }

    /* ── Menu bar ───────────────────────────────────── */
    .menubar {
      background: var(--xp-bg);
      border-bottom: 1px solid var(--xp-border-mid);
      padding: 1px 3px;
      display: flex;
    }
    .menu-item {
      padding: 2px 8px;
      font-size: 11px;
      cursor: default;
      border-radius: 2px;
      border: 1px solid transparent;
    }
    .menu-item:hover {
      background: var(--xp-selected);
      color: #fff;
      border-color: var(--xp-blue-dark);
    }

    /* ── Content area ───────────────────────────────── */
    .content {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Section panel ──────────────────────────────── */
    .panel {
      border: 1px solid;
      border-color: var(--xp-border-mid) var(--xp-border-lite)
                    var(--xp-border-lite) var(--xp-border-mid);
      background: var(--xp-bg);
    }
    .panel-head {
      background: linear-gradient(180deg, var(--xp-selected), #1B47A0);
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 9px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .panel-body { padding: 8px; }

    /* ── Upload zone ────────────────────────────────── */
    .upload-zone {
      border: 2px dashed #8898C4;
      background: #F6F4EE;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      transition: background .1s, border-color .1s;
      padding: 18px;
      text-align: center;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      background: #DCE6F8;
      border-color: var(--xp-selected);
    }
    .upload-zone .uz-icon { font-size: 30px; }
    .upload-zone .uz-main { font-size: 12px; font-weight: bold; color: #222; }
    .upload-zone .uz-sub  { font-size: 10px; color: #666; }

    /* ── Image preview ──────────────────────────────── */
    .preview-wrap {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      max-height: 300px;
      overflow: hidden;
      position: relative;
    }
    #preview-img {
      max-width: 100%;
      max-height: 298px;
      display: block;
    }
    .split-line {
      position: absolute;
      background: rgba(255, 60, 60, .85);
      box-shadow: 0 0 5px rgba(255,0,0,.7);
      pointer-events: none;
      display: none;
    }
    .split-line.vertical   { top: 0; bottom: 0; width: 2px; }
    .split-line.horizontal { left: 0; right: 0; height: 2px; }

    /* ── Inline fieldset ────────────────────────────── */
    .fieldset {
      border: 1px solid var(--xp-border-mid);
      padding: 8px 8px 6px;
      margin-top: 6px;
      position: relative;
    }
    .fieldset-legend {
      position: absolute;
      top: -7px; left: 8px;
      background: var(--xp-bg);
      padding: 0 3px;
      font-size: 10px;
      color: #555;
    }

    /* ── Control row ────────────────────────────────── */
    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }
    .ctrl-row label.name { min-width: 72px; }
    input[type=range] { flex: 1; height: 14px; cursor: pointer; accent-color: var(--xp-selected); }
    .ctrl-val { min-width: 44px; text-align: right; color: #444; font-variant-numeric: tabular-nums; }

    .radio-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 3px 0 1px;
    }
    .radio-row .name { min-width: 72px; }
    .radio-lbl { display: flex; align-items: center; gap: 3px; cursor: pointer; }

    /* ── XP Button ──────────────────────────────────── */
    .btn {
      height: 23px;
      padding: 0 14px;
      background: linear-gradient(180deg, #F5F4EA 0%, #ECE9D8 45%, #DDD9C4 100%);
      border: 1px solid;
      border-color: #fff #8E9190 #8E9190 #fff;
      outline: 1px solid #8E9190;
      font-family: Tahoma, sans-serif;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover {
      background: linear-gradient(180deg, #E8F0FC 0%, #C4D4F0 100%);
      border-color: #fff var(--xp-selected) var(--xp-selected) #fff;
      outline-color: var(--xp-selected);
    }
    .btn:active {
      background: linear-gradient(180deg, #C4D4F0 0%, #E8F0FC 100%);
      border-color: #8E9190 #fff #fff #8E9190;
    }
    .btn:disabled { color: #ACA899; cursor: default; }

    .btn.primary {
      background: linear-gradient(180deg, #7ABCFF 0%, #316AC5 45%, #1B5AC8 100%);
      color: #fff;
      font-weight: bold;
      border-color: #fff var(--xp-blue-dark) var(--xp-blue-dark) #fff;
      outline-color: var(--xp-blue-dark);
      text-shadow: 0 1px 1px rgba(0,0,0,.4);
    }
    .btn.primary:hover {
      background: linear-gradient(180deg, #9ACFFF 0%, #4880D5 45%, #2B6AD8 100%);
    }
    .btn.primary:active {
      background: linear-gradient(180deg, #1B5AC8 0%, #4880D5 100%);
    }
    .btn.sm { height: 18px; padding: 0 8px; font-size: 10px; outline: none; }

    .btn-row { display: flex; gap: 5px; justify-content: flex-end; margin-top: 6px; }

    /* ── Progress bar ───────────────────────────────── */
    .progress-outer {
      border: 2px inset var(--xp-border-mid);
      background: #fff;
      height: 18px;
      padding: 2px;
      margin-top: 6px;
    }
    .progress-inner {
      height: 100%;
      background: linear-gradient(180deg, #6BAAE8 0%, #1B5AC8 100%);
      width: 0%;
      transition: width .22s ease-out;
    }

    /* ── Results grid ───────────────────────────────── */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .result-box {
      border: 2px solid;
      border-color: var(--xp-border-mid) #fff #fff var(--xp-border-mid);
      background: #111;
      display: flex;
      flex-direction: column;
    }
    .result-header {
      background: var(--xp-bg);
      padding: 2px 5px;
      font-size: 10px;
      border-bottom: 1px solid var(--xp-border-mid);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .result-canvas-wrap {
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 72px;
      flex: 1;
    }
    .result-canvas-wrap canvas {
      max-width: 100%;
      max-height: 150px;
    }
    .result-footer {
      background: var(--xp-bg);
      border-top: 1px solid var(--xp-border-mid);
      padding: 1px 5px;
      font-size: 10px;
      color: #555;
    }

    /* ── Status bar ─────────────────────────────────── */
    .statusbar {
      border-top: 1px solid var(--xp-border-mid);
      background: var(--xp-bg);
      display: flex;
      gap: 2px;
      padding: 2px 4px;
    }
    .st-cell {
      border: 1px inset var(--xp-border-mid);
      padding: 1px 5px;
      font-size: 10px;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .st-cell.grow { flex: 1; }
    .st-cell.w150 { width: 150px; }
    .st-cell.w90  { width: 90px; }

    /* ── Taskbar ────────────────────────────────────── */
    .taskbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 38px;
      background: linear-gradient(180deg, #245EDC 0%, #1040AA 100%);
      border-top: 2px solid #5A90D4;
      display: flex;
      align-items: center;
      padding: 0 4px;
      gap: 4px;
      z-index: 999;
    }
    .start-btn {
      height: 30px;
      padding: 0 10px 0 7px;
      border-radius: 0 12px 12px 0;
      background: linear-gradient(180deg, #60C060 0%, #2A7830 100%);
      border: 1px solid #1A5020;
      color: #fff;
      font-family: Tahoma, sans-serif;
      font-size: 13px;
      font-weight: bold;
      font-style: italic;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 1px 4px rgba(0,0,0,.5);
      flex-shrink: 0;
    }
    .taskbar-win {
      height: 28px;
      padding: 0 8px;
      min-width: 110px;
      background: linear-gradient(180deg, #2A5BAD, #102890);
      border: 1px inset rgba(120,160,255,.4);
      color: #fff;
      font-family: Tahoma, sans-serif;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tray {
      margin-left: auto;
      height: 28px;
      padding: 0 9px;
      border: 1px inset rgba(120,160,255,.3);
      color: #fff;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }

    /* ── Utility ────────────────────────────────────── */
    .hidden { display: none !important; }
    hr.xp { border: none; border-top: 1px solid var(--xp-border-mid); border-bottom: 1px solid #fff; margin: 4px 0; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     MAIN WINDOW
════════════════════════════════════════════════ -->
<div class="window" id="main-win">

  <!-- Title Bar -->
  <div class="titlebar">
    <svg class="titlebar-icon" viewBox="0 0 16 16">
      <rect x="1" y="2" width="14" height="12" rx="1" fill="#fff" opacity=".92"/>
      <rect x="1" y="2" width="14" height="4"  rx="1" fill="#FFD700"/>
      <line x1="8" y1="2" x2="8" y2="14" stroke="#AAA" stroke-width=".9"/>
      <circle cx="4.5" cy="10.5" r="1.5" fill="#5599FF" opacity=".85"/>
      <circle cx="11.5" cy="10.5" r="1.5" fill="#FF5599" opacity=".85"/>
    </svg>
    <span class="titlebar-text">Half Frame Film Splitter</span>
    <div class="titlebar-btns">
      <div class="tb-btn min" title="최소화">&#x2212;</div>
      <div class="tb-btn max" title="최대화">&#x25A1;</div>
      <div class="tb-btn close" id="close-btn" title="닫기">&#x2715;</div>
    </div>
  </div>

  <!-- Menu Bar -->
  <div class="menubar">
    <span class="menu-item">파일(F)</span>
    <span class="menu-item">편집(E)</span>
    <span class="menu-item">보기(V)</span>
    <span class="menu-item">도움말(H)</span>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- ① Upload -->
    <div class="panel" id="upload-panel">
      <div class="panel-head">📂&nbsp; 사진 불러오기</div>
      <div class="panel-body" style="padding:7px;">
        <div class="upload-zone" id="upload-zone">
          <div class="uz-icon">🎞️</div>
          <div class="uz-main">하프 프레임 필름 사진을 여기에 끌어다 놓으세요</div>
          <div class="uz-sub">또는 클릭하여 파일 선택 &nbsp;·&nbsp; JPG / PNG / WebP</div>
          <input type="file" id="file-input" accept="image/jpeg,image/jpg,image/png,image/webp" hidden>
        </div>
      </div>
    </div>

    <!-- ② Preview & Adjust -->
    <div class="panel hidden" id="preview-panel">
      <div class="panel-head">🔍&nbsp; 미리보기 및 분할 위치 조정</div>
      <div class="panel-body" style="padding:7px; display:flex; flex-direction:column; gap:6px;">

        <div class="preview-wrap" id="preview-wrap">
          <img id="preview-img" alt="미리보기">
          <div class="split-line vertical" id="split-line"></div>
        </div>

        <div class="fieldset">
          <span class="fieldset-legend">분할 설정</span>

          <div class="ctrl-row" style="margin-top:6px;">
            <label class="name">분할 위치</label>
            <input type="range" id="pos-slider" min="20" max="80" value="50" step="0.1">
            <span class="ctrl-val" id="pos-lbl">50.0%</span>
          </div>

          <div class="ctrl-row">
            <label class="name">틈 제거 폭</label>
            <input type="range" id="gap-slider" min="0" max="8" value="1" step="0.1">
            <span class="ctrl-val" id="gap-lbl">1.0%</span>
          </div>

          <div class="radio-row">
            <span class="name">분할 방향</span>
            <label class="radio-lbl"><input type="radio" name="dir" value="vertical" checked> 좌우 분할 (기본)</label>
            <label class="radio-lbl"><input type="radio" name="dir" value="horizontal"> 상하 분할</label>
          </div>

          <div class="btn-row">
            <button class="btn" id="auto-btn">🔎 자동 감지</button>
            <button class="btn" id="reset-btn">↺ 초기화</button>
          </div>
        </div>

        <!-- Progress (hidden until split) -->
        <div class="progress-outer hidden" id="progress-outer">
          <div class="progress-inner" id="progress-bar"></div>
        </div>

        <div class="btn-row">
          <button class="btn primary" id="split-btn">✂️&nbsp; 분할 실행</button>
        </div>
      </div>
    </div>

    <!-- ③ Results -->
    <div class="panel hidden" id="results-panel">
      <div class="panel-head">💾&nbsp; 분할 결과</div>
      <div class="panel-body" style="padding:7px; display:flex; flex-direction:column; gap:6px;">
        <div class="results-grid">
          <div class="result-box">
            <div class="result-header">
              <span id="lbl-frame1">📷 프레임 1 (왼쪽)</span>
              <button class="btn sm" id="dl-left">저장</button>
            </div>
            <div class="result-canvas-wrap">
              <canvas id="canvas-left"></canvas>
            </div>
            <div class="result-footer" id="info-left">—</div>
          </div>
          <div class="result-box">
            <div class="result-header">
              <span id="lbl-frame2">📷 프레임 2 (오른쪽)</span>
              <button class="btn sm" id="dl-right">저장</button>
            </div>
            <div class="result-canvas-wrap">
              <canvas id="canvas-right"></canvas>
            </div>
            <div class="result-footer" id="info-right">—</div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn primary" id="dl-all-btn">💾&nbsp; 두 장 모두 저장</button>
        </div>
      </div>
    </div>

  </div><!-- /content -->

  <!-- Status Bar -->
  <div class="statusbar">
    <div class="st-cell grow" id="st-msg">파일을 선택하거나 끌어다 놓으세요.</div>
    <div class="st-cell w150"  id="st-size">&nbsp;</div>
    <div class="st-cell w90"   id="st-split">&nbsp;</div>
  </div>

</div><!-- /window -->

<!-- ═══════════════════════════════════════════════
     TASKBAR
════════════════════════════════════════════════ -->
<div class="taskbar">
  <button class="start-btn">🪟 시작</button>
  <div class="taskbar-win">🎞️ Half Frame Splitter</div>
  <div class="tray">
    <span>🔊</span>
    <span id="tray-clock">--:--</span>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     SCRIPT
════════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  /* ── Shortcuts ─────────────────────────────────── */
  const $ = id => document.getElementById(id);
  const show = id => $(id).classList.remove('hidden');
  const hide = id => $(id).classList.add('hidden');

  /* ── State ─────────────────────────────────────── */
  let srcImage = null;   // HTMLImageElement at full resolution
  let srcFile  = null;   // original File object
  let splitPos = 0.5;    // split position as 0–1 fraction
  let gapFrac  = 0.01;   // gap removal width as 0–1 fraction
  let direction = 'vertical'; // 'vertical' | 'horizontal'

  /* ── Clock ─────────────────────────────────────── */
  (function tickClock() {
    const d = new Date();
    $('tray-clock').textContent =
      String(d.getHours()).padStart(2,'0') + ':' +
      String(d.getMinutes()).padStart(2,'0');
    setTimeout(tickClock, 15000);
  })();

  /* ── Title bar buttons (cosmetic) ──────────────── */
  $('close-btn').addEventListener('click', () => {
    $('main-win').style.display = 'none';
  });

  /* ── File upload ────────────────────────────────── */
  const uploadZone = $('upload-zone');
  const fileInput  = $('file-input');

  uploadZone.addEventListener('click',     () => fileInput.click());
  uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  function loadFile(file) {
    srcFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        srcImage = img;
        $('preview-img').src = ev.target.result;

        show('preview-panel');
        hide('results-panel');
        hide('progress-outer');

        splitPos = 0.5;
        $('pos-slider').value = 50;
        $('pos-lbl').textContent = '50.0%';
        gapFrac = 0.01;
        $('gap-slider').value = 1;
        $('gap-lbl').textContent = '1.0%';

        $('st-msg').textContent  = `불러옴: ${file.name}`;
        $('st-size').textContent = `${img.width} × ${img.height} px`;

        // Wait for layout, then draw guide line and auto-detect
        const onReady = () => { renderLine(); setTimeout(autoDetect, 50); };
        if ($('preview-img').complete) onReady();
        else $('preview-img').onload = onReady;
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  /* ── Split line ─────────────────────────────────── */
  function renderLine() {
    if (!srcImage) return;
    const wrap = $('preview-wrap');
    const img  = $('preview-img');
    const line = $('split-line');

    const wW = wrap.clientWidth;
    const wH = wrap.clientHeight;
    const iW = img.clientWidth;
    const iH = img.clientHeight;

    line.className = 'split-line ' + direction;

    if (direction === 'vertical') {
      const offX = (wW - iW) / 2;
      line.style.left   = (offX + iW * splitPos) + 'px';
      line.style.top    = '';
      line.style.width  = '2px';
      line.style.height = '';
    } else {
      const offY = (wH - iH) / 2;
      line.style.top    = (offY + iH * splitPos) + 'px';
      line.style.left   = '';
      line.style.height = '2px';
      line.style.width  = '';
    }
    line.style.display = 'block';
    $('st-split').textContent = `분할: ${(splitPos * 100).toFixed(1)}%`;
  }

  window.addEventListener('resize', () => { if (srcImage) renderLine(); });

  /* ── Sliders ────────────────────────────────────── */
  $('pos-slider').addEventListener('input', e => {
    splitPos = +e.target.value / 100;
    $('pos-lbl').textContent = (+e.target.value).toFixed(1) + '%';
    renderLine();
  });
  $('gap-slider').addEventListener('input', e => {
    gapFrac = +e.target.value / 100;
    $('gap-lbl').textContent = (+e.target.value).toFixed(1) + '%';
  });
  document.querySelectorAll('input[name=dir]').forEach(r => {
    r.addEventListener('change', e => {
      direction = e.target.value;
      renderLine();
    });
  });

  /* ── Auto-detect gap ────────────────────────────── */
  $('auto-btn').addEventListener('click', autoDetect);

  function autoDetect() {
    if (!srcImage) return;

    // Downsample for speed, but keep enough resolution
    const W = Math.min(srcImage.width,  1400);
    const H = Math.min(srcImage.height, 900);
    const oc = document.createElement('canvas');
    oc.width = W; oc.height = H;
    const ctx = oc.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(srcImage, 0, 0, W, H);
    const pixels = ctx.getImageData(0, 0, W, H).data;

    const coord = direction === 'vertical'
      ? findDarkStrip(pixels, W, H, 'col')
      : findDarkStrip(pixels, W, H, 'row');

    splitPos = direction === 'vertical' ? coord / W : coord / H;
    splitPos = Math.max(0.2, Math.min(0.8, splitPos)); // clamp

    $('pos-slider').value = (splitPos * 100).toFixed(1);
    $('pos-lbl').textContent = (splitPos * 100).toFixed(1) + '%';
    renderLine();
    $('st-msg').textContent = `자동 감지 완료 — 분할 위치: ${(splitPos * 100).toFixed(1)}%`;
  }

  /**
   * Scan the middle 40% of the image along the given axis,
   * compute luminance average per column (or row), smooth,
   * and return the index of the darkest position.
   */
  function findDarkStrip(data, W, H, axis) {
    const len   = axis === 'col' ? W : H;
    const cross = axis === 'col' ? H : W;
    const lo = Math.floor(len * 0.30);
    const hi = Math.floor(len * 0.70);

    const lum = new Float32Array(len);

    for (let i = lo; i < hi; i++) {
      let sum = 0;
      for (let j = 0; j < cross; j++) {
        const idx = axis === 'col'
          ? (j * W + i) * 4   // column i, row j
          : (i * W + j) * 4;  // row i, col j
        // Rec. 709 luminance
        sum += data[idx] * 0.2126 + data[idx+1] * 0.7152 + data[idx+2] * 0.0722;
      }
      lum[i] = sum / cross;
    }

    // Gaussian-like smoothing (radius 5)
    const smoothed = lum.slice();
    for (let i = lo + 5; i < hi - 5; i++) {
      smoothed[i] = (lum[i-5] + lum[i-3]*2 + lum[i-1]*3 +
                     lum[i]   * 4 +
                     lum[i+1]*3 + lum[i+3]*2 + lum[i+5]) / 16;
    }

    let minVal = Infinity, minIdx = Math.floor(len / 2);
    for (let i = lo; i < hi; i++) {
      if (smoothed[i] < minVal) { minVal = smoothed[i]; minIdx = i; }
    }
    return minIdx;
  }

  /* ── Reset ──────────────────────────────────────── */
  $('reset-btn').addEventListener('click', () => {
    splitPos = 0.5; gapFrac = 0.01;
    $('pos-slider').value = 50;   $('pos-lbl').textContent = '50.0%';
    $('gap-slider').value = 1;    $('gap-lbl').textContent = '1.0%';
    renderLine();
  });

  /* ── Split ──────────────────────────────────────── */
  $('split-btn').addEventListener('click', doSplit);

  function doSplit() {
    if (!srcImage) return;

    show('progress-outer');
    $('progress-bar').style.width = '0%';
    $('st-msg').textContent = '분할 중...';

    // Let the browser paint the progress bar before heavy work
    requestAnimationFrame(() => requestAnimationFrame(() => {
      $('progress-bar').style.width = '30%';

      setTimeout(() => {
        const W = srcImage.width;
        const H = srcImage.height;

        const dim     = direction === 'vertical' ? W : H;
        const splitPx = Math.round(dim * splitPos);
        const gapPx   = Math.round(dim * gapFrac);
        const half    = Math.floor(gapPx / 2);
        const edge1   = splitPx - half;
        const edge2   = splitPx + (gapPx - half);

        // ── Frame 1 ──
        let f1w, f1h, sx2, sy2, f2w, f2h;
        if (direction === 'vertical') {
          f1w = edge1;     f1h = H;
          sx2 = edge2;     sy2 = 0;
          f2w = W - edge2; f2h = H;
        } else {
          f1w = W;         f1h = edge1;
          sx2 = 0;         sy2 = edge2;
          f2w = W;         f2h = H - edge2;
        }

        $('progress-bar').style.width = '55%';

        const cL = $('canvas-left');
        cL.width = f1w; cL.height = f1h;
        const ctxL = cL.getContext('2d');
        ctxL.imageSmoothingEnabled = false;
        ctxL.drawImage(srcImage, 0, 0, f1w, f1h, 0, 0, f1w, f1h);

        $('progress-bar').style.width = '80%';

        const cR = $('canvas-right');
        cR.width = f2w; cR.height = f2h;
        const ctxR = cR.getContext('2d');
        ctxR.imageSmoothingEnabled = false;
        ctxR.drawImage(srcImage, sx2, sy2, f2w, f2h, 0, 0, f2w, f2h);

        $('progress-bar').style.width = '100%';

        // Labels
        const names = direction === 'vertical'
          ? ['왼쪽', '오른쪽'] : ['위쪽', '아래쪽'];
        $('lbl-frame1').textContent = `📷 프레임 1 (${names[0]})`;
        $('lbl-frame2').textContent = `📷 프레임 2 (${names[1]})`;
        $('info-left').textContent  = `${f1w} × ${f1h} px`;
        $('info-right').textContent = `${f2w} × ${f2h} px`;

        setTimeout(() => {
          hide('progress-outer');
          show('results-panel');
          $('st-msg').textContent =
            `분할 완료 ✓   프레임 1: ${f1w}×${f1h}  /  프레임 2: ${f2w}×${f2h}`;
        }, 280);
      }, 60);
    }));
  }

  /* ── Download helpers ───────────────────────────── */
  function dlCanvas(canvas, filename) {
    const ext  = srcFile ? srcFile.name.split('.').pop().toLowerCase() : 'jpg';
    const mime = ext === 'png'  ? 'image/png'  :
                 ext === 'webp' ? 'image/webp' : 'image/jpeg';
    const q    = mime === 'image/png' ? undefined : 0.97;

    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = Object.assign(document.createElement('a'), { href: url, download: filename });
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, mime, q);
  }

  function baseAndExt() {
    const name = srcFile ? srcFile.name : 'frame.jpg';
    const dot  = name.lastIndexOf('.');
    return dot > 0
      ? [name.slice(0, dot), name.slice(dot)]
      : [name, '.jpg'];
  }

  $('dl-left').addEventListener('click', () => {
    const [base, ext] = baseAndExt();
    dlCanvas($('canvas-left'), `${base}_frame1${ext}`);
  });
  $('dl-right').addEventListener('click', () => {
    const [base, ext] = baseAndExt();
    dlCanvas($('canvas-right'), `${base}_frame2${ext}`);
  });
  $('dl-all-btn').addEventListener('click', () => {
    const [base, ext] = baseAndExt();
    dlCanvas($('canvas-left'),  `${base}_frame1${ext}`);
    setTimeout(() => dlCanvas($('canvas-right'), `${base}_frame2${ext}`), 350);
  });

})();
</script>
</body>
</html>
